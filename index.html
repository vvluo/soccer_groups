<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Group Stage Finishes Visualized</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --ink: #2b2f36;
    --muted: #8a929e;
    --accent: #2b7de9;
    --border: #e2e6ec;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 28px 48px;
  }
  h1 {
    text-align: center;
    font-size: 38px;
    font-weight: 800;
    margin: 8px 0 4px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin: 0 0 20px;
    font-size: 15px;
  }
  /* Navbar */
  nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 18px 0 26px;
  }
  nav button {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  nav button:hover { border-color: var(--accent); color: var(--accent); }
  nav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px rgba(43,125,233,0.3);
  }
  /* Layout */
  .view-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 16px;
  }
  .stage {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .chart-card {
    flex: 1 1 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 6px 18px rgba(20,30,50,0.05);
  }
  #chart { width: 100%; display: block; }
  /* Legend */
  .legend {
    flex: 0 0 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 6px 18px rgba(20,30,50,0.05);
  }
  .legend h3 {
    margin: 0 0 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 7px 0;
    font-size: 14px;
  }
  .swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    flex: 0 0 16px;
    border: 1px solid rgba(0,0,0,0.08);
  }
  /* Rectangle cells */
  .cell { stroke: #fff; stroke-width: 1.5; cursor: default; transition: opacity 0.1s; }
  .cell:hover { opacity: 0.82; }
  .cell-label {
    fill: #fff;
    font-size: 22px;
    font-weight: 600;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }
  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(28,32,40,0.96);
    color: #fff;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.45;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 10;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    max-width: 240px;
  }
  #tooltip b { color: #ffd56b; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Group Stage Finishes Visualized</h1>
  <p class="subtitle"> assuming equal probability for win/draw/loss in every match</p>

  <nav id="navbar"></nav>

  <h2 class="view-title" id="viewTitle"></h2>

  <div class="stage">
    <div class="chart-card">
      <svg id="chart" viewBox="0 0 960 600" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="legend">
      <h3 id="legendTitle">Legend</h3>
      <div id="legendItems"></div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ---- View definitions ----
const VIEWS = [
  { key: "Draws",         label: "Group Draws",            title: "Group Draws" },
  { key: "Points_Rank_1", label: "1st Place",              title: "1st Place Team Points" },
  { key: "Points_Rank_2", label: "2nd Place",              title: "2nd Place Team Points" },
  { key: "Points_Rank_3", label: "3rd Place",              title: "3rd Place Team Points" },
  { key: "Points_Rank_4", label: "4th Place",              title: "4th Place Team Points" },
];

const W = 960, H = 600;
const svg = document.getElementById("chart");
const tooltip = document.getElementById("tooltip");
let DATA = [];
let currentView = 0;

// ---- CSV loading ----
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const header = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cells = line.split(",");
    const row = {};
    header.forEach((h, i) => {
      const key = h.trim() === "" ? "idx" : h.trim();
      row[key] = cells[i];
    });
    return {
      points: row.Points,
      freq: +row.Freq,
      Draws: +row.Draws,
      Points_Rank_1: +row.Points_Rank_1,
      Points_Rank_2: +row.Points_Rank_2,
      Points_Rank_3: +row.Points_Rank_3,
      Points_Rank_4: +row.Points_Rank_4,
    };
  });
}

// ---- Squarified treemap ----
function squarify(items, x, y, w, h) {
  // items: [{value, data}], values already scaled so sum == w*h
  const result = [];
  const stack = items.slice();
  let row = [];
  let cx = x, cy = y, cw = w, ch = h;

  function worst(rowArr, side) {
    if (rowArr.length === 0) return Infinity;
    const sum = rowArr.reduce((a, b) => a + b.value, 0);
    let max = -Infinity, min = Infinity;
    for (const r of rowArr) { if (r.value > max) max = r.value; if (r.value < min) min = r.value; }
    const s2 = sum * sum, side2 = side * side;
    return Math.max((side2 * max) / s2, s2 / (side2 * min));
  }

  function layout(rowArr) {
    const sum = rowArr.reduce((a, b) => a + b.value, 0);
    if (cw >= ch) {
      // column on the left, items stacked vertically
      const colW = sum / ch;
      let yy = cy;
      for (const it of rowArr) {
        const itH = it.value / colW;
        result.push({ x: cx, y: yy, w: colW, h: itH, data: it.data });
        yy += itH;
      }
      cx += colW; cw -= colW;
    } else {
      // row on top, items laid horizontally
      const rowH = sum / cw;
      let xx = cx;
      for (const it of rowArr) {
        const itW = it.value / rowH;
        result.push({ x: xx, y: cy, w: itW, h: rowH, data: it.data });
        xx += itW;
      }
      cy += rowH; ch -= rowH;
    }
  }

  while (stack.length > 0) {
    const item = stack[0];
    const side = Math.min(cw, ch);
    if (row.length === 0 || worst(row, side) >= worst(row.concat(item), side)) {
      row.push(item);
      stack.shift();
    } else {
      layout(row);
      row = [];
    }
  }
  if (row.length > 0) layout(row);
  return result;
}

// Decide whether a fill color is light enough that black text reads better
// than white. Uses the perceptual YIQ brightness of the color; bright/light
// fills (lime, cyan, pink, magenta) cross the threshold and get dark text.
function useDarkText(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const yiq = (r * 299 + g * 587 + b * 114) / 1000;
  return yiq >= 125;
}

// ---- Color mapping ----
// Convert HSL to a #rrggbb hex string (so useDarkText can read it).
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const c = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    return Math.round(255 * c).toString(16).padStart(2, "0");
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

// Build ONE global value -> color map across every view so a given number is
// always the same color. Colors form a uniform rainbow ordered by value:
// the smallest value is red (hue 0) and the largest is purple (hue 280),
// evenly spaced around the spectrum in between.
const HUE_START = 0;   // red
const HUE_END = 280;   // purple
let GLOBAL_COLOR_MAP = new Map();
function buildGlobalColorMap() {
  const allValues = new Set();
  VIEWS.forEach(v => DATA.forEach(d => allValues.add(d[v.key])));
  const sorted = [...allValues].sort((a, b) => a - b);
  GLOBAL_COLOR_MAP = new Map();
  const n = sorted.length;
  sorted.forEach((v, i) => {
    const t = n > 1 ? i / (n - 1) : 0;
    const hue = HUE_START + t * (HUE_END - HUE_START);
    GLOBAL_COLOR_MAP.set(v, hslToHex(hue, 75, 55));
  });
}

// Distinct values present for the active view (for the legend), in sorted order.
function valuesForView(viewKey) {
  return [...new Set(DATA.map(d => d[viewKey]))].sort((a, b) => a - b);
}

// ---- Render ----
function render() {
  const view = VIEWS[currentView];
  document.getElementById("viewTitle").textContent = view.title;

  const colorMap = GLOBAL_COLOR_MAP;
  const values = valuesForView(view.key);

  // scale freq to area
  const totalFreq = DATA.reduce((a, d) => a + d.freq, 0);
  const area = W * H;
  const items = DATA
    .map(d => ({ value: (d.freq / totalFreq) * area, data: d }))
    .sort((a, b) => b.value - a.value);

  const cells = squarify(items, 0, 0, W, H);

  // draw
  svg.innerHTML = "";
  const NS = "http://www.w3.org/2000/svg";
  for (const c of cells) {
    const d = c.data;
    const g = document.createElementNS(NS, "g");

    const rect = document.createElementNS(NS, "rect");
    rect.setAttribute("class", "cell");
    rect.setAttribute("x", c.x);
    rect.setAttribute("y", c.y);
    rect.setAttribute("width", Math.max(0, c.w));
    rect.setAttribute("height", Math.max(0, c.h));
    rect.setAttribute("fill", colorMap.get(d[view.key]));

    rect.addEventListener("mousemove", e => showTip(e, d, view));
    rect.addEventListener("mouseleave", hideTip);
    g.appendChild(rect);

    // label if cell big enough
    if (c.w > 38 && c.h > 22) {
      const fill = colorMap.get(d[view.key]);
      const t = document.createElementNS(NS, "text");
      t.setAttribute("class", "cell-label");
      t.setAttribute("x", c.x + 7);
      t.setAttribute("y", c.y + 24);
      // On light/saturated fills, black text reads better than white.
      // Use inline style (not the fill attribute) so it beats the .cell-label CSS rule.
      if (useDarkText(fill)) {
        t.style.fill = "#1a1a1a";
        t.style.textShadow = "0 1px 2px rgba(255,255,255,0.55)";
      }
      t.textContent = d.points;
      g.appendChild(t);
    }
    svg.appendChild(g);
  }

  // legend
  const legendTitle = document.getElementById("legendTitle");
  const legendItems = document.getElementById("legendItems");
  legendTitle.textContent = view.label;
  legendItems.innerHTML = "";
  values.forEach(v => {
    const item = document.createElement("div");
    item.className = "legend-item";
    const sw = document.createElement("span");
    sw.className = "swatch";
    sw.style.background = colorMap.get(v);
    const txt = document.createElement("span");
    const unit = view.key === "Draws"
      ? (v === 1 ? "1 draw" : v + " draws")
      : v + " pts";
    txt.textContent = unit;
    item.appendChild(sw);
    item.appendChild(txt);
    legendItems.appendChild(item);
  });
}

function showTip(e, d, view) {
  tooltip.style.opacity = 1;
  tooltip.style.left = (e.clientX + 14) + "px";
  tooltip.style.top = (e.clientY + 14) + "px";
  const valLabel = view.key === "Draws"
    ? d.Draws + (d.Draws === 1 ? " draw" : " draws")
    : d[view.key] + " pts";
  tooltip.innerHTML =
    `<b>Points: ${d.points}</b><br>` +
    `Frequency: ${d.freq}<br>` +
    `${view.label}: ${valLabel}`;
}
function hideTip() { tooltip.style.opacity = 0; }

// ---- Navbar ----
function buildNav() {
  const nav = document.getElementById("navbar");
  VIEWS.forEach((v, i) => {
    const btn = document.createElement("button");
    btn.textContent = v.label;
    if (i === 0) btn.classList.add("active");
    btn.addEventListener("click", () => {
      currentView = i;
      [...nav.children].forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
    nav.appendChild(btn);
  });
}

// ---- Init ----
fetch("points.csv")
  .then(r => r.text())
  .then(text => {
    DATA = parseCSV(text);
    buildGlobalColorMap();
    buildNav();
    render();
  })
  .catch(err => {
    document.querySelector(".wrap").innerHTML +=
      `<p style="color:red">Failed to load points.csv — ${err}</p>`;
  });
</script>
</body>
</html>
